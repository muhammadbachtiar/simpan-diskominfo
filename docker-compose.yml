version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simpan_backend
    restart: unless-stopped
    ports:
      - "8082:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - simpan_backend_upload:/var/www/html/storage/app/public
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/api || curl -f http://localhost/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simpan_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - simpan_frontend_upload:/var/www/html/storage/app/public
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
volumes:
  simpan_backend_upload:
    driver: local
  simpan_frontend_upload:
    driver: local
